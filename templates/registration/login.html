{% extends 'base.html' %}

{% block title %}Login - Kitchen Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <h1 class="text-center mb-4">Kitchen Manager</h1>
                <h3 class="text-center mb-4">Login</h3>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg-custom w-100">Login</button>
                </form>

                <hr class="my-4">
                <p class="text-center mb-0">
                    Don't have an account?
                    <a href="{% url 'kitchen:register' %}">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
