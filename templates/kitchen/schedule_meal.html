{% extends 'base.html' %}

{% block title %}Schedule Meal - Kitchen Manager{% endblock %}

{% block content %}
<h1 class="mb-4">Schedule a Meal</h1>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="{{ form.meal_plan.id_for_label }}" class="form-label">Select Meal Plan</label>
                {{ form.meal_plan }}
            </div>

            <div class="mb-3">
                <label for="{{ form.scheduled_date.id_for_label }}" class="form-label">Date</label>
                {{ form.scheduled_date }}
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg-custom">Schedule Meal</button>
                <a href="{% url 'kitchen:dashboard' %}" class="btn btn-secondary btn-lg-custom">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
