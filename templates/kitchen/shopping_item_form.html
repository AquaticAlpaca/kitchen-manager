{% extends 'base.html' %}

{% block title %}Add Shopping Item - Kitchen Manager{% endblock %}

{% block content %}
<h1 class="mb-4">Add Shopping Item</h1>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="{{ form.name.id_for_label }}" class="form-label">Item Name</label>
                {{ form.name }}
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="{{ form.quantity_needed.id_for_label }}" class="form-label">Quantity Needed</label>
                    {{ form.quantity_needed }}
                </div>
                <div class="col-md-6 mb-3">
                    <label for="{{ form.unit.id_for_label }}" class="form-label">Unit</label>
                    {{ form.unit }}
                </div>
            </div>

            <div class="mb-3">
                <label for="{{ form.notes.id_for_label }}" class="form-label">Notes</label>
                {{ form.notes }}
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg-custom">Add to List</button>
                <a href="{% url 'kitchen:shopping_list' %}" class="btn btn-secondary btn-lg-custom">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
